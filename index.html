<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كش ملك - رهف</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* أسود سينمائي عميق */
            color: #e8d8b7; /* لون بيج/ذهبي فاتح مريح للعين */
            font-family: 'Amiri', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* إضاءة خافتة جداً في المنتصف */
            background-image: radial-gradient(circle at center, #1a1515 0%, #050505 60%);
        }

        /* المشهد الفني للشطرنج */
        .chess-scene {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInScene 2s ease forwards 0.5s;
        }

        @keyframes fadeInScene {
            to { opacity: 1; transform: translateY(0); }
        }

        .piece {
            font-size: 5rem;
            color: #d4af37; /* ذهبي هادئ */
            text-shadow: 0 10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.2);
            line-height: 1;
        }

        .queen {
            font-size: 5.5rem; /* الملكة أكبر قليلاً */
            transform: translateY(-5px);
        }

        .heart {
            font-size: 1.5rem;
            color: #9b111e; /* أحمر ياقوتي داكن */
            animation: pulse 2s infinite;
            text-shadow: 0 0 10px rgba(155, 17, 30, 0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* حاوية النص */
        .text-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            font-size: 1.8rem;
            line-height: 2;
            min-height: 150px;
            position: relative;
        }

        .line {
            display: block;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .highlight {
            color: #d4af37;
        }

        .checkmate {
            color: #9b111e;
            font-size: 2.2rem;
            font-weight: bold;
            display: block;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* المؤشر */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d4af37;
            vertical-align: middle;
            margin-right: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* التوقيع */
        .signature {
            position: absolute;
            bottom: 30px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .signature.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .piece { font-size: 4rem; }
            .queen { font-size: 4.5rem; }
            .text-container { font-size: 1.4rem; }
            .checkmate { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="chess-scene">
        <div class="piece king">♚</div>
        <div class="heart">♥</div>
        <div class="piece queen">♛</div>
    </div>

    <div class="text-container">
        <span id="text-output"></span><span class="cursor" id="cursor"></span>
    </div>

    <div class="signature" id="signature">إعداد قيس جازي</div>

    <script>
        // كلام قصير، عميق، وغير ممل
        const lines = [
            "في قانون اللعبة، الملك يخطو خطوة واحدة..",
            "والملكة تملك الرقعة بأكملها.",
            "وهكذا أنتِ يا <span class='highlight'>رهف</span>..",
            "تملكين كل الاتجاهات في قلبي.",
            "<span class='checkmate'>كش ملك.</span>"
        ];

        const textOutput = document.getElementById('text-output');
        const signature = document.getElementById('signature');
        const cursor = document.getElementById('cursor');

        let lineIndex = 0;
        let charIndex = 0;
        let isHTML = false;
        let htmlBuffer = "";

        const typingSpeed = 70; // سرعة معتدلة ومريحة
        const pauseBetweenLines = 1200; // توقف درامي بين السطور

        function type() {
            if (lineIndex >= lines.length) {
                // إظهار التوقيع ببطء بعد انتهاء النص
                setTimeout(() => {
                    signature.classList.add('show');
                    cursor.style.display = 'none'; // إخفاء المؤشر في النهاية
                }, 1000);
                return;
            }

            const currentLine = lines[lineIndex];

            if (charIndex === 0 && lineIndex > 0) {
                textOutput.innerHTML += "<br>"; // سطر جديد
            }

            if (charIndex < currentLine.length) {
                let char = currentLine.charAt(charIndex);

                if (char === '<') isHTML = true;

                if (isHTML) {
                    htmlBuffer += char;
                    if (char === '>') {
                        isHTML = false;
                        textOutput.innerHTML += htmlBuffer;
                        htmlBuffer = "";
                    }
                } else {
                    textOutput.innerHTML += char;
                }

                charIndex++;
                
                // إذا كان الحرف علامة توقف (نقطة أو فاصلة)، نبطئ قليلاً لإضافة واقعية
                let delay = typingSpeed;
                if (char === '.' || char === '،') delay += 300;

                setTimeout(type, isHTML ? 0 : delay);
            } else {
                lineIndex++;
                charIndex = 0;
                setTimeout(type, pauseBetweenLines);
            }
        }

        // بدء المشهد بعد ثانية ونصف
        setTimeout(type, 1500);
    </script>
</body>
</html>
